name: Windows Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'release tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: pyinst.bat
      shell: cmd
      run: |
        python -m pip install pyinstaller
        python -m pip install -r requirements.txt
        python -m PyInstaller HwGDReqs.spec

    - name: Check warnings
      shell: pwsh
      run: |
        if (Test-Path "build/HwGDReqs/warn-HwGDReqs.txt") {
          Get-Content "build/HwGDReqs/warn-HwGDReqs.txt"
        }
    
    - name: dist/hwgdreqs zip
      shell: pwsh
      run: |
        Compress-Archive -Path dist/hwgdreqs/* -DestinationPath hwgdreqs-windows-portable.zip -Force
    
    # inno
    - name: Compile Inno Setup installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: inno.iss
        options: /O+ /O"output"
    
    - name: Find the installer
      id: finder
      shell: pwsh
      run: |
        # search for HwGDReqs-setup.exe anywhere
        $exePath = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter "HwGDReqs-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($exePath) {
          Write-Host "Found installer at: $($exePath.FullName)"
          $directory = Split-Path -Path $exePath.FullName -Parent
          $filename = Split-Path -Path $exePath.FullName -Leaf
          echo "installer_path=$($exePath.FullName)" >> $env:GITHUB_OUTPUT
          echo "installer_dir=$directory" >> $env:GITHUB_OUTPUT
          echo "installer_file=$filename" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "::error::HwGDReqs-setup.exe not found!"
          exit 1
        }
    
    - name: upload asset to release
      shell: pwsh
      run: |
        Write-Host "Uploading to release: ${{ github.event.inputs.release_tag }}"
        Write-Host "Installer path: ${{ steps.finder.outputs.installer_path }}"
        
        gh release upload "${{ github.event.inputs.release_tag }}" `
          hwgdreqs-windows-portable.zip `
          "${{ steps.finder.outputs.installer_path }}" `
          --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hwgdreqs-windows-builds
        path: |
          hwgdreqs-windows-portable.zip
          ${{ steps.finder.outputs.installer_path }}