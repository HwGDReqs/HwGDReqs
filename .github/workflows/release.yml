name: Windows Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'release tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: pyinst.bat
      shell: cmd
      run: |
        python -m pip install pyinstaller
        python -m pip install -r requirements.txt
        python -m PyInstaller HwGDReqs.spec
    
    - name: dist/hwgdreqs zip
      shell: pwsh
      run: |
        Compress-Archive -Path dist/hwgdreqs/* -DestinationPath hwgdreqs-windows-portable.zip -Force
    
    # inno
    - name: Compile Inno Setup installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: inno.iss
        options: /O+
    
    - name: upload asset to release
      shell: pwsh
      run: |
        Write-Host "Uploading to release: ${{ github.event.inputs.release_tag }}"
        # Upload both the portable zip AND the setup installer
        gh release upload "${{ github.event.inputs.release_tag }}" `
          hwgdreqs-windows-portable.zip `
          HwGDReqs-setup.exe `
          --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hwgdreqs-windows-builds
        path: |
          hwgdreqs-windows-portable.zip
          HwGDReqs-setup.exe